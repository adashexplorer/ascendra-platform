<!-- @dsCard group="Foundations" name="Spacing & elevation" subtitle="A 0.70× spacing scale, 8px radius, and three shadow levels tuned to the dark ground" viewport="640x560" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nocturne — Spacing &amp; elevation</title>
<link rel="stylesheet" href="../styles.css" />
<style>
/* Demo scaffolding only — everything visual comes from ../styles.css. */
.demo { max-width: 620px; margin: 0 auto; padding: var(--space-6) var(--space-4) var(--space-8); }
.demo-head {
  font-family: var(--font-body); font-size: 11px; font-weight: inherit;
  letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.55;
  margin: var(--space-6) 0 var(--space-3);
}
.demo-head:first-child { margin-top: 0; }
.row { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }
.stack { display: grid; gap: var(--space-3); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); }
.note { font-size: 12px; opacity: 0.6; max-width: 60ch; }
code { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 0.92em; }
.sprow { display: flex; align-items: center; gap: var(--space-3); margin: 6px 0; }
.tlabel { flex: none; width: 84px; font-size: 10px; letter-spacing: 0.06em; opacity: 0.45; }
.bar { height: 12px; background: var(--color-accent); border-radius: var(--radius-sm); }
.swc { flex: 1; } .swl { font-size: 10px; opacity: 0.5; margin-top: 6px; }
.rbox { height: 56px; border: 1px solid var(--color-divider); background: var(--color-surface); }
.ebox { height: 72px; border-radius: var(--radius-md); background: var(--color-surface); }
.erow { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-4); }
.radii { display: flex; gap: var(--space-3); }
</style>
</head>
<body>
<main class="demo">
<div class="demo-head">Spacing — 4px × 0.70 density</div>
  <div class="sprow"><span class="tlabel">--space-1</span><div class="bar" style="width: var(--space-1)"></div></div>
  <div class="sprow"><span class="tlabel">--space-2</span><div class="bar" style="width: var(--space-2)"></div></div>
  <div class="sprow"><span class="tlabel">--space-3</span><div class="bar" style="width: var(--space-3)"></div></div>
  <div class="sprow"><span class="tlabel">--space-4</span><div class="bar" style="width: var(--space-4)"></div></div>
  <div class="sprow"><span class="tlabel">--space-6</span><div class="bar" style="width: var(--space-6)"></div></div>
  <div class="sprow"><span class="tlabel">--space-8</span><div class="bar" style="width: var(--space-8)"></div></div>
  <div class="demo-head">Radius</div>
  <div class="radii"><div class="swc"><div class="rbox" style="border-radius: var(--radius-sm)"></div><div class="swl">--radius-sm</div></div><div class="swc"><div class="rbox" style="border-radius: var(--radius-md)"></div><div class="swl">--radius-md</div></div><div class="swc"><div class="rbox" style="border-radius: var(--radius-lg)"></div><div class="swl">--radius-lg</div></div></div>
  <div class="demo-head">Elevation</div>
  <div class="erow">
    <div class="ebox elev-sm"></div>
    <div class="ebox elev-md"></div>
    <div class="ebox elev-lg"></div>
  </div>
  <div class="demo-head">Rules</div>
  <p class="note">This system has no dividers: separate sections with whitespace from the spacing scale, not with rules or boxes.</p>
</main>
</body>
</html>
