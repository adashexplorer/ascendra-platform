<!-- @dsCard group="Components" name="Table" subtitle="Rows separated by a whisper of the text color; status cells reuse the tags" viewport="640x420" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nocturne — Table</title>
<link rel="stylesheet" href="../styles.css" />
<style>
/* Demo scaffolding only — everything visual comes from ../styles.css. */
.demo { max-width: 620px; margin: 0 auto; padding: var(--space-6) var(--space-4) var(--space-8); }
.demo-head {
  font-family: var(--font-body); font-size: 11px; font-weight: inherit;
  letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.55;
  margin: var(--space-6) 0 var(--space-3);
}
.demo-head:first-child { margin-top: 0; }
.row { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }
.stack { display: grid; gap: var(--space-3); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); }
.note { font-size: 12px; opacity: 0.6; max-width: 60ch; }
code { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 0.92em; }
</style>
</head>
<body>
<main class="demo">
<div class="demo-head">Table</div>
  <table class="table">
    <thead><tr><th>Page</th><th>Status</th><th>Owner</th><th>Updated</th></tr></thead>
    <tbody>
      <tr><td>Overview</td><td><span class="tag tag-accent">Live</span></td><td>Ada</td><td class="text-muted">Today</td></tr>
      <tr><td>Components</td><td><span class="tag tag-outline">In review</span></td><td>Grace</td><td class="text-muted">Yesterday</td></tr>
      <tr><td>Tokens</td><td><span class="tag tag-neutral">Draft</span></td><td>Lin</td><td class="text-muted">Mon</td></tr>
      <tr><td>Templates</td><td><span class="tag tag-neutral">Draft</span></td><td>Noor</td><td class="text-muted">Mon</td></tr>
    </tbody>
  </table>
  <p class="note">Header cells are small caps of the body face; rows take a faint hover tint. Keep numeric columns right-aligned with a local rule when you need one.</p>
</main>
</body>
</html>
