<!-- @dsCard group="Components" name="Forms" subtitle="Text inputs, a segmented control and radios — native elements, themed states" viewport="640x520" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nocturne — Forms</title>
<link rel="stylesheet" href="../styles.css" />
<style>
/* Demo scaffolding only — everything visual comes from ../styles.css. */
.demo { max-width: 620px; margin: 0 auto; padding: var(--space-6) var(--space-4) var(--space-8); }
.demo-head {
  font-family: var(--font-body); font-size: 11px; font-weight: inherit;
  letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.55;
  margin: var(--space-6) 0 var(--space-3);
}
.demo-head:first-child { margin-top: 0; }
.row { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }
.stack { display: grid; gap: var(--space-3); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3); }
.note { font-size: 12px; opacity: 0.6; max-width: 60ch; }
code { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 0.92em; }
</style>
</head>
<body>
<main class="demo">
<div class="demo-head">Fields</div>
  <div class="grid-2">
    <div class="stack">
      <div class="field"><label for="ds-name">Project name</label>
        <input class="input" id="ds-name" value="Untitled project" /></div>
      <div class="field"><label for="ds-notes">Notes</label>
        <textarea class="input" id="ds-notes" rows="3">A couple of lines of placeholder copy, long enough to wrap.</textarea></div>
    </div>
    <div class="stack">
      <div class="field"><label id="ds-view-label">View</label>
        <div class="seg" role="radiogroup" aria-labelledby="ds-view-label">
          <label class="seg-opt"><input type="radio" name="view" checked /><svg width="13" height="13" viewBox="0 0 256 256" fill="currentColor"><path d="M197.58,129.06,146,110l-19-51.62a15.92,15.92,0,0,0-29.88,0L78,110l-51.62,19a15.92,15.92,0,0,0,0,29.88L78,178l19,51.62a15.92,15.92,0,0,0,29.88,0L146,178l51.62-19a15.92,15.92,0,0,0,0-29.88ZM137,164.22a8,8,0,0,0-4.74,4.74L112,223.85,91.78,169A8,8,0,0,0,87,164.22L32.15,144,87,123.78A8,8,0,0,0,91.78,119L112,64.15,132.22,119a8,8,0,0,0,4.74,4.74L191.85,144ZM144,40a8,8,0,0,1,8-8h16V16a8,8,0,0,1,16,0V32h16a8,8,0,0,1,0,16H184V64a8,8,0,0,1-16,0V48H152A8,8,0,0,1,144,40ZM248,88a8,8,0,0,1-8,8h-8v8a8,8,0,0,1-16,0V96h-8a8,8,0,0,1,0-16h8V72a8,8,0,0,1,16,0v8h8A8,8,0,0,1,248,88Z"/></svg>Grid</label>
          <label class="seg-opt"><input type="radio" name="view" /><svg width="13" height="13" viewBox="0 0 256 256" fill="currentColor"><path d="M230.91,172A8,8,0,0,1,228,182.91l-96,56a8,8,0,0,1-8.06,0l-96-56A8,8,0,0,1,36,169.09l92,53.65,92-53.65A8,8,0,0,1,230.91,172ZM220,121.09l-92,53.65L36,121.09A8,8,0,0,0,28,134.91l96,56a8,8,0,0,0,8.06,0l96-56A8,8,0,1,0,220,121.09ZM24,80a8,8,0,0,1,4-6.91l96-56a8,8,0,0,1,8.06,0l96,56a8,8,0,0,1,0,13.82l-96,56a8,8,0,0,1-8.06,0l-96-56A8,8,0,0,1,24,80Zm23.88,0L128,126.74,208.12,80,128,33.26Z"/></svg>List</label>
          <label class="seg-opt"><input type="radio" name="view" /><svg width="13" height="13" viewBox="0 0 256 256" fill="currentColor"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Z"/></svg>Board</label>
        </div></div>
      <div class="field"><label id="ds-apply-label">Apply to</label>
        <div class="stack" style="gap: var(--space-1)" role="radiogroup" aria-labelledby="ds-apply-label">
          <label class="radio"><input type="radio" name="apply" checked /><span class="dot"></span>Every page</label>
          <label class="radio"><input type="radio" name="apply" /><span class="dot"></span>Only new pages</label>
          <label class="radio"><input type="radio" name="apply" /><span class="dot"></span>Ask each time</label>
        </div></div>
    </div>
  </div>
  <button type="button" class="btn btn-primary btn-block">Save changes</button>
  <p class="note">Labels sit above their fields. Inputs are <code>.input</code> on the native element; the segmented control and radios are native radio inputs, so focus, arrow keys and checked state need no script.</p>
</main>
</body>
</html>
