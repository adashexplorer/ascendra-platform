openapi: 3.0.3
info:
  title: Ascendra Platform API
  version: 1.0.0
  description: |
    Consolidated **gateway contract** for the Ascendra AI interview-prep
    platform. This is the single executable realization of
    `.claude/hld/25-api-contracts.md`: every row of that endpoint outline maps
    to exactly one operation here, across SVC-ID, SVC-PROF, SVC-ASSESS,
    SVC-ROAD, SVC-PROG, SVC-AI, and the future SVC-NOTIF endpoints.

    Contract-first: no backend code exists yet. The eventual source of truth is
    springdoc-openapi generated per service from the Java code; this document
    fixes the surface and naming so the per-service specs cannot drift.

    Conventions:
    - Gateway prefixes are exact — `/api/**` external, `/internal/**`
      service-to-service only, `/mcp` for the MCP JSON-RPC endpoint.
    - Errors are RFC 9457 `application/problem+json` (the `Problem` schema).
    - Long-running work returns `202` with a status resource using the
      `parsing` / `scoring` vocabulary (ADR-005); clients poll the matching
      status endpoint.
    - `429` responses carry a `Retry-After` header.
  contact:
    name: Ascendra platform team
  license:
    name: Proprietary
    url: https://ascendra.example/license
servers:
  - url: http://127.0.0.1:4010
    description: Prism mock server (npm run mock)
  - url: https://api.ascendra.example
    description: Production edge (SVC-GW gateway)

tags:
  - name: identity
    description: SVC-ID — accounts, authentication, entitlements (11-identity-service.md).
  - name: profile
    description: SVC-PROF — profile, resume, skills, notes/todos, privacy (12-profile-service.md).
  - name: assessment
    description: SVC-ASSESS — diagnostic, drills, mocks, coding tests, gaps (13-assessment-service.md).
  - name: roadmap
    description: SVC-ROAD — phased roadmap, gap store, resource catalog (14-roadmap-service.md).
  - name: progress
    description: SVC-PROG — readiness, trend, history (15-progress-service.md).
  - name: ai
    description: SVC-AI — chat orchestration, MCP, generation/scoring/curation (16-ai-orchestrator-service.md).
  - name: notification
    description: SVC-NOTIF — notification preferences (17-notification-service.md, future).
  - name: internal
    description: Service-to-service `/internal/**` operations, never routed by the public gateway.

security:
  - bearerAuth: []

paths:
  # ==================================================================
  # SVC-ID — identity
  # ==================================================================
  /api/auth/register:
    post:
      tags: [identity]
      operationId: registerAccount
      summary: Register a new account
      description: |
        Creates an account via Keycloak and returns access/refresh tokens
        (FR-01). Public — no bearer token required.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created; tokens issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/auth/login:
    post:
      tags: [identity]
      operationId: login
      summary: Log in with credentials
      description: Exchanges email + password for access/refresh tokens (FR-01). Public.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated; tokens issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/auth/refresh:
    post:
      tags: [identity]
      operationId: refreshToken
      summary: Refresh the access token
      description: Exchanges a valid refresh token for a new access token (FR-01). Public path; the refresh token authenticates the caller.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New tokens issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/auth/logout:
    post:
      tags: [identity]
      operationId: logout
      summary: Revoke the current session
      description: Revokes the caller's session/refresh token (FR-01, user self).
      responses:
        '204':
          description: Session revoked.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/me:
    get:
      tags: [identity]
      operationId: getMe
      summary: Current user identity
      description: Returns userId, email, and tier for the authenticated user (FR-01, FR-02).
      responses:
        '200':
          description: Current identity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /internal/entitlements/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    get:
      tags: [identity, internal]
      operationId: getEntitlements
      summary: '[internal] Tier and limits for a user'
      description: Returns tier and gating/budget limits for a user (FR-02, NFR-07). Service-to-service only.
      security:
        - serviceAuth: []
      responses:
        '200':
          description: Entitlements for the user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entitlements'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [identity, internal]
      operationId: setEntitlements
      summary: '[internal] Set a user tier'
      description: Sets the tier for a user (FR-02). Admin/service only.
      security:
        - serviceAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntitlementsUpdate'
      responses:
        '200':
          description: Updated entitlements.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entitlements'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/Unprocessable'

  # ==================================================================
  # SVC-PROF — profile
  # ==================================================================
  /api/profile:
    get:
      tags: [profile]
      operationId: getProfile
      summary: Get profile
      description: Profile including plan display, readiness snapshot, competencies, weak areas, and gap tags (FR-02).
      responses:
        '200':
          description: The user's profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [profile]
      operationId: updateProfile
      summary: Update profile
      description: Update display name and/or target role (FR-02, user self).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdate'
      responses:
        '200':
          description: Updated profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/resume:
    post:
      tags: [profile]
      operationId: uploadResume
      summary: Upload a resume
      description: |
        Multipart upload of a PDF/DOCX resume (≤ 10 MB). The file is scanned,
        stored, and queued for async LLM extraction (FR-03, FR-04). Returns
        `202` with a status resource; poll `GET /api/resume/status`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Resume file, PDF or DOCX, ≤ 10 MB.
      responses:
        '202':
          description: Upload accepted; extraction queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeAccepted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/resume/status:
    get:
      tags: [profile]
      operationId: getResumeParseStatus
      summary: Resume upload/parse status
      description: Current upload/parse status — `scanning` | `parsing` | `parsed` | `failed`. SPA polls during onboarding (FR-03, FR-04).
      responses:
        '200':
          description: Current resume status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/profile/skills:
    get:
      tags: [profile]
      operationId: getSkillInventory
      summary: Extracted skill inventory
      description: The skill inventory extracted from the resume (FR-04).
      responses:
        '200':
          description: Extracted skills.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillInventory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/notes:
    get:
      tags: [profile]
      operationId: getNotes
      summary: Get notes
      description: Free-form notes text plus `updatedAt` (FR-24).
      responses:
        '200':
          description: The user's notes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notes'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [profile]
      operationId: updateNotes
      summary: Autosave notes
      description: Full-document replace, last-write-wins per user; client debounces (FR-24, NFR-02).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotesUpdate'
      responses:
        '200':
          description: Saved notes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notes'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/todos:
    get:
      tags: [profile]
      operationId: listTodos
      summary: List TODOs
      description: The user's TODO list (FR-24).
      responses:
        '200':
          description: TODO items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TodoItem'
              example:
                - id: td-1
                  text: Finish Phase 2 concurrency module
                  done: false
                - id: td-2
                  text: Book a system-design mock
                  done: true
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [profile]
      operationId: createTodo
      summary: Add a TODO
      description: Adds a TODO; whitespace-only text is rejected (FR-24).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoCreate'
      responses:
        '201':
          description: Created TODO.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/todos/{id}:
    parameters:
      - $ref: '#/components/parameters/TodoIdPath'
    patch:
      tags: [profile]
      operationId: toggleTodo
      summary: Toggle a TODO
      description: Toggles the done state of a TODO (FR-24).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                done:
                  type: boolean
              required: [done]
              example:
                done: true
      responses:
        '200':
          description: Updated TODO.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [profile]
      operationId: deleteTodo
      summary: Remove a TODO
      description: Removes a TODO from the list (FR-24).
      responses:
        '204':
          description: Removed.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/privacy/export:
    post:
      tags: [profile]
      operationId: requestDataExport
      summary: Request a data export
      description: Starts an async account data export bundle including notes/todos (FR-20, FR-24). Returns a status resource.
      responses:
        '202':
          description: Export started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyExportStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/privacy/erase:
    post:
      tags: [profile]
      operationId: requestErasure
      summary: Start account erasure
      description: Starts the GDPR erasure saga across services (FR-20). Returns `202` with an erasureId to poll.
      responses:
        '202':
          description: Erasure saga started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErasureAccepted'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/privacy/erase/{erasureId}:
    parameters:
      - name: erasureId
        in: path
        required: true
        schema:
          type: string
        description: Erasure saga identifier returned by POST /api/privacy/erase.
    get:
      tags: [profile]
      operationId: getErasureStatus
      summary: Erasure saga progress
      description: Returns progress of the erasure saga (FR-20).
      responses:
        '200':
          description: Saga progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErasureStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /internal/profiles/{userId}/skills:
    parameters:
      - $ref: '#/components/parameters/UserIdPath'
    get:
      tags: [profile, internal]
      operationId: getInternalProfileSkills
      summary: '[internal] Skill inventory and target role'
      description: Skill inventory plus target role for gap analysis and RAG (FR-05, FR-16). Service-to-service only.
      security:
        - serviceAuth: []
      responses:
        '200':
          description: Inventory and target role.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillInventory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================================================================
  # SVC-ASSESS — assessment
  # ==================================================================
  /api/assessments/diagnostic:
    post:
      tags: [assessment]
      operationId: createDiagnostic
      summary: Create or return diagnostic session
      description: Creates (or returns the in-progress) 50-question diagnostic session once inventory is ready (FR-05).
      responses:
        '200':
          description: Existing in-progress session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticSession'
        '201':
          description: New diagnostic session assembled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/assessments/diagnostic/current:
    get:
      tags: [assessment]
      operationId: getCurrentDiagnostic
      summary: Current diagnostic session
      description: Returns the session plus resume position (`diagIdx`), cross-device (FR-06).
      responses:
        '200':
          description: Current session and resume position.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/assessments/diagnostic/answers/{qIdx}:
    parameters:
      - name: qIdx
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
        description: Zero-based question index within the diagnostic session.
    put:
      tags: [assessment]
      operationId: saveDiagnosticAnswer
      summary: Save a diagnostic answer
      description: Saves a free-text answer; auto-save doubles as save-and-exit (FR-06).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiagnosticAnswer'
      responses:
        '204':
          description: Answer saved.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/assessments/diagnostic/submit:
    post:
      tags: [assessment]
      operationId: submitDiagnostic
      summary: Submit the diagnostic
      description: Finishes the diagnostic; transitions to `scoring` and kicks off async scoring (FR-07). Poll the session or gaps.
      responses:
        '202':
          description: Submitted; scoring in progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoringAccepted'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/assessments/diagnostic/reset:
    post:
      tags: [assessment]
      operationId: resetDiagnostic
      summary: Re-run the diagnostic
      description: Archives the old session and starts fresh (FR-06).
      responses:
        '201':
          description: New session started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticSession'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/assessments/gaps:
    get:
      tags: [assessment]
      operationId: getAssessmentGaps
      summary: Skill-gap report
      description: The computed skill-gap report — competencies (level vs target), strengths, priority gaps, ETA (FR-08).
      responses:
        '200':
          description: Skill-gap report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GapReport'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/drills/today:
    get:
      tags: [assessment]
      operationId: getTodayDrills
      summary: Today's drill set
      description: Today's 10 drill questions plus the resume position (FR-11).
      responses:
        '200':
          description: Today's drill set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrillSet'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/drills/answers:
    post:
      tags: [assessment]
      operationId: submitDrillAnswer
      summary: Submit a drill answer
      description: |
        Submits a drill answer for synchronous LLM feedback within ≤ 5 s
        (FR-12, NFR-03). Returns `200` with feedback, or `202` with a scoring
        status resource when the sync path fails over (NFR-11).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DrillAnswer'
      responses:
        '200':
          description: Synchronous feedback.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrillFeedback'
        '202':
          description: Scoring queued (sync fallback).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoringAccepted'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/mocks:
    post:
      tags: [assessment]
      operationId: startMock
      summary: Start a mock session
      description: Starts an adaptive mock interview session; questions drawn from gap areas, optionally filtered by level (FR-13).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                level:
                  $ref: '#/components/schemas/QuestionLevel'
              example:
                level: Advanced
      responses:
        '201':
          description: Mock session started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/mocks/{id}/answers:
    parameters:
      - $ref: '#/components/parameters/SessionIdPath'
    post:
      tags: [assessment]
      operationId: answerMock
      summary: Answer a mock question
      description: Submits an answer and returns the adapted follow-up question (FR-13).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MockAnswer'
      responses:
        '200':
          description: Adapted follow-up question.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterviewQuestion'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/mocks/{id}/finish:
    parameters:
      - $ref: '#/components/parameters/SessionIdPath'
    post:
      tags: [assessment]
      operationId: finishMock
      summary: Finish a mock session
      description: Ends the mock; transitions to `scoring` and kicks off async scoring (FR-14).
      responses:
        '202':
          description: Finished; scoring in progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoringAccepted'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/mocks/{id}:
    parameters:
      - $ref: '#/components/parameters/SessionIdPath'
    get:
      tags: [assessment]
      operationId: getMock
      summary: Get a mock session
      description: Returns the session, including the score once state is `scored`; SPA polls (FR-14).
      responses:
        '200':
          description: Session (with score when scored).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MockSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/coding-tests:
    post:
      tags: [assessment]
      operationId: startCodingTest
      summary: Start a coding test
      description: |
        Starts a configurable coding test. Config `{difficulty?, count?, area?}`
        defaults to random / 5 / mixed; questions are selected and shuffled from
        the coding bank (FR-22).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodingTestConfig'
      responses:
        '201':
          description: Coding test started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodingTest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/coding-tests/{id}/solutions:
    parameters:
      - $ref: '#/components/parameters/SessionIdPath'
    post:
      tags: [assessment]
      operationId: submitCodingSolution
      summary: Submit a coding solution
      description: Submits the solution text for the current question and returns the next question (FR-22).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodingSolution'
      responses:
        '200':
          description: Next question (or end-of-test marker).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodingQuestion'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/coding-tests/{id}/finish:
    parameters:
      - $ref: '#/components/parameters/SessionIdPath'
    post:
      tags: [assessment]
