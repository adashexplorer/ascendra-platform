      type: object
      required: [questions, auditRef]
      properties:
        questions:
          type: array
          items:
            $ref: '#/components/schemas/DiagnosticQuestion'
        auditRef:
          type: string
      example:
        auditRef: aud-71b0
        questions:
          - { area: Automation, level: Beginner, q: 'Design a page-object model for a flaky checkout flow.' }
          - { area: Concurrency, level: Beginner, q: 'What is a race condition? Give a concrete example.' }

    GenerateFollowupRequest:
      type: object
      required: [sessionId, lastAnswer]
      properties:
        sessionId:
          type: string
        area:
          type: string
        level:
          $ref: '#/components/schemas/QuestionLevel'
        lastAnswer:
          type: string
      example:
        sessionId: mock-9f2c
        area: System Design
        level: Advanced
        lastAnswer: I would isolate the shard and inject a partition...

    ScoreDrillRequest:
      type: object
      required: [area, q, answer]
      properties:
        area:
          type: string
        q:
          type: string
        answer:
          type: string
      example:
        area: Concurrency
        q: What is a race condition?
        answer: Two threads read-modify-write shared state without a lock...

    GeneratePhaseRequest:
      type: object
      required: [userId, gaps]
      properties:
        userId:
          type: string
        gaps:
          type: array
          items:
            $ref: '#/components/schemas/GapItem'
        resourceIds:
          type: array
          items:
            type: string
      example:
        userId: usr-8f31
        gaps:
          - { short: 'Rate-limiter partitions', long: 'Rate-limiter correctness under network partitions', res: 'System Design Primer', url: 'https://github.com/donnemartin/system-design-primer' }
        resourceIds: [res-sdp, res-chaos]

    CurateResourceRequest:
      type: object
      required: [area]
      properties:
        area:
          type: string
        gap:
          type: string
      example:
        area: Concurrency
        gap: Thread-safety under contention

    AuditRecord:
      type: object
      required: [auditRef, taskType, model, createdAt]
      properties:
        auditRef:
          type: string
        taskType:
          type: string
          description: e.g. diagnostic-scoring, mock-scoring, coding-scoring, resume-extraction.
        model:
          type: string
        promptHash:
          type: string
        tokensIn:
          type: integer
        tokensOut:
          type: integer
        createdAt:
          type: string
          format: date-time
      example:
        auditRef: aud-71b0
        taskType: mock-scoring
        model: gpt-4o-mini
        promptHash: sha256:9a1f...
        tokensIn: 2100
        tokensOut: 640
        createdAt: '2026-07-20T09:02:00Z'

    NotificationPreferences:
      type: object
      properties:
        channels:
          type: array
          items:
            type: string
            enum: [email, push, inapp]
        schedule:
          type: string
          description: e.g. daily-9am, weekdays-only.
        enabled:
          type: boolean
      example:
        channels: [email, inapp]
        schedule: weekdays-9am
        enabled: true

    RoadmapSummary:
      type: object
      properties:
        activePhase:
          type: string
        completedPhases:
          type: integer
        totalPhases:
          type: integer
        nextModule:
          type: string
      example:
        activePhase: 'Phase 2 · Test Engineering Depth'
        completedPhases: 1
        totalPhases: 4
        nextModule: Concurrency & flaky-test debugging
