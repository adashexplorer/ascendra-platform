components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Access token (JWT) issued by SVC-ID. Resources scoped to `jwt.sub`;
        self resources carry no user id in the path.
    serviceAuth:
      type: apiKey
      in: header
      name: X-Service-Auth
      description: |
        Service-to-service authentication for `/internal/**`. Modeled as an
        API-key header for OpenAPI 3.0, but is realized as mTLS (client
        credentials) plus a propagated end-user JWT (22-security.md).

  parameters:
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string
      description: Target user id (JWT subject).
    TodoIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: TODO identifier.
    SessionIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Session identifier.
    ModuleIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Roadmap module identifier.
    ResourceIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Catalog resource identifier.

  headers:
    RetryAfter:
      description: Seconds the client should wait before retrying.
      required: true
      schema:
        type: integer
        minimum: 0

  responses:
    BadRequest:
      description: Malformed request.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://api.ascendra.example/problems/unauthorized
            title: Unauthorized
            status: 401
            detail: A valid bearer token is required.
            instance: /api/profile
    Forbidden:
      description: Authenticated but not permitted.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Conflicting state.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unprocessable:
      description: Validation failed.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://api.ascendra.example/problems/validation
            title: Unprocessable Entity
            status: 422
            detail: One or more fields failed validation.
            instance: /api/todos
    PayloadTooLarge:
      description: Upload exceeds the 10 MB limit.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    RateLimited:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://api.ascendra.example/problems/rate-limited
            title: Too Many Requests
            status: 429
            detail: Rate limit exceeded; retry after the indicated delay.
            instance: /api/chat/messages
    ServerError:
      description: Unexpected server error.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:
    Problem:
      type: object
      description: RFC 9457 problem detail (application/problem+json).
      properties:
        type:
          type: string
          format: uri
          default: about:blank
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
