  # ==================================================================
  # SVC-AI — ai-orchestrator
  # ==================================================================
  /api/chat/messages:
    post:
      tags: [ai]
      operationId: sendChatMessage
      summary: Send a chat message (SSE)
      description: |
        Sends a chat turn and streams the reply as Server-Sent Events, ending
        with a quick-actions event (FR-16, FR-17).

        Note: OpenAPI 3.0 cannot fully model token streaming — the response is
        described as a single `text/event-stream` string; the `example` shows
        the realistic multi-event shape (incremental `data:` chunks followed by
        a terminal `quick-actions` event).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatMessageRequest'
      responses:
        '200':
          description: SSE stream of response chunks and a final quick-actions event.
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: message
                data: {"delta":"Your readiness is 68 "}

                event: message
                data: {"delta":"and trending up +6 pts this week. "}

                event: message
                data: {"delta":"Focus next on concurrency and distributed-systems gaps."}

                event: quick-actions
                data: {"actions":[{"id":"start-drill","label":"Start today's drill"},{"id":"schedule-mock","label":"Schedule a mock"}]}

                event: done
                data: {"finishReason":"stop"}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/chat/history:
    get:
      tags: [ai]
      operationId: getChatHistory
      summary: Chat transcript
      description: Recent chat transcript as JSON (FR-16).
      responses:
        '200':
          description: Recent transcript.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatMessage'
              example:
                - role: user
                  text: How am I doing?
                  at: '2026-07-20T09:00:00Z'
                - role: assistant
                  text: Readiness 68, up +6 pts this week. Concurrency is your top gap.
                  at: '2026-07-20T09:00:03Z'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /mcp:
    post:
      tags: [ai, internal]
      operationId: mcpJsonRpc
      summary: '[internal] MCP JSON-RPC endpoint'
      description: |
        MCP server endpoint exposing tools (readiness, gaps, roadmap,
        start-drill, schedule-mock) to external MCP clients over JSON-RPC 2.0
        (FR-18). This is **not REST** and is not fully modeled here — request
        and response bodies are generic JSON-RPC envelopes. The gateway routes
        `/mcp/*` in its own rate-limit bucket (ADR-007). See 20-ai-layer.md.

        Authenticated with a user token by the external client (the `internal`
        tag reflects that it is not part of the normal REST product surface).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: JSON-RPC 2.0 request envelope.
              additionalProperties: true
              example:
                jsonrpc: '2.0'
                id: 1
                method: tools/call
                params:
                  name: readiness
                  arguments: {}
      responses:
        '200':
          description: JSON-RPC 2.0 response envelope.
          content:
            application/json:
              schema:
                type: object
                description: JSON-RPC 2.0 response envelope.
                additionalProperties: true
                example:
                  jsonrpc: '2.0'
                  id: 1
                  result:
                    readiness: 68
                    target: 85
                    delta: '+6 pts this week'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

